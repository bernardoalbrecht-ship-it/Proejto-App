name: Gerar APK do VacaVet (Otimizado e Compactado)

# Quando roda:
#  - a cada push nas branches main/master
#  - manualmente pelo botão "Run workflow" na aba Actions do GitHub
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK (Android)
    # Ubuntu 22.04: tem o libtinfo5 que o toolchain do Android precisa
    # (no 24.04 esse pacote foi removido e o build quebra).
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Preparar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configurar Cache do ccache (Acelera re-compilações)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # Sufixo -v2: invalida caches antigos de propósito (build do zero).
          key: ccache-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-v2-${{ runner.os }}-

      - name: Configurar Cache do Buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          # Sufixo -v2: invalida caches antigos de propósito (build do zero).
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v2-${{ runner.os }}-

      - name: Instalar dependências do sistema e utilitários
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Instalar Buildozer e Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Inicializar ccache e limpar caches Buildozer desnecessários
        run: |
          ccache --max-size=2G
          ccache --show-stats
          if [ -d ".buildozer/android/platform/build" ]; then
            echo "Limpando diretórios de compilação temporários antigos para compactar o cache..."
            find .buildozer/android/platform/build -name "*.o" -type f -delete 2>/dev/null || true
          fi

      - name: Configurar credenciais do Login com Google (se o segredo existir)
        # O JSON do "OAuth Client" NÃO fica no repositório (é sensível). Aqui
        # ele é escrito a partir do segredo GOOGLE_OAUTH_CLIENT_JSON do
        # GitHub Actions, para ser empacotado no APK. Sem o segredo, o app
        # compila normalmente e apenas mostra "login não configurado".
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          if [ -n "$GOOGLE_OAUTH_CLIENT_JSON" ]; then
            mkdir -p credenciais
            printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > credenciais/oauth_client.json
            echo "credenciais/oauth_client.json criado a partir do segredo."
          else
            echo "Segredo GOOGLE_OAUTH_CLIENT_JSON ausente; login com Google ficará desativado neste APK."
          fi

      - name: Compilar o APK (Debug)
        # IMPORTANTE: o Android Gradle Plugin exige Java 17, mas o JAVA_HOME
        # padrão do runner pode apontar para outra versão na hora em que o
        # Buildozer chama o gradlew (foi isso que já quebrou o build antes:
        # "Android Gradle plugin requires Java 17 ... using Java 11").
        # Forçamos o Java 17 (JAVA_HOME_17_X64 já existe no runner) antes de
        # compilar.
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="/usr/lib/ccache:$JAVA_HOME/bin:$PATH"
          export USE_CCACHE=1
          java -version
          yes | buildozer android debug

      - name: Prunar arquivos de build temporários pós-compilação (Compactação Crítica)
        if: always()
        run: |
          ccache --show-stats
          # Pruna o diretório .buildozer local removendo arquivos intermediários descartáveis,
          # mantendo apenas as dists prontas, SDKs e NDKs para que o cache permaneça compacto (<500MB em vez de 5GB+!)
          if [ -d ".buildozer" ]; then
            echo "Compactando diretório .buildozer antes de salvar o cache..."
            find .buildozer -name "*.o" -type f -delete 2>/dev/null || true
            find .buildozer -name "*.pyc" -type f -delete 2>/dev/null || true
            find .buildozer -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Publicar o APK como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: vacavet-apk
          path: bin/*.apk
          if-no-files-found: error
