name: Gerar APK do VacaVet

# Quando roda:
#  - a cada push nas branches main/master
#  - manualmente pelo botão "Run workflow" na aba Actions do GitHub
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Compilar com Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable

      - name: Publicar o APK como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: vacavet-apk
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: error
