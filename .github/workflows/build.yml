name: Gerar APK do VacaVet

# Quando roda:
#  - a cada push nas branches main/master
#  - manualmente pelo botão "Run workflow" na aba Actions do GitHub
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK (Android)
    # Ubuntu 22.04: tem o libtinfo5 que o toolchain do Android precisa
    # (no 24.04 esse pacote foi removido e o build quebra).
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Preparar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Instalar Buildozer e Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Guardar cache do Buildozer (acelera builds futuros)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Compilar o APK
        run: yes | buildozer android debug

      - name: Publicar o APK como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: vacavet-apk
          path: bin/*.apk
          if-no-files-found: error
