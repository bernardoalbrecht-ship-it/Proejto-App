name: Gerar APK do VetSheets

# Roda a cada push na main/master ou manualmente pelo botão "Run workflow"
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK (Android)
    # Ubuntu 22.04: ainda tem o libtinfo5 que o toolchain do Android usa
    runs-on: ubuntu-22.04
    # Builds do Buildozer na primeira vez demoram (baixa SDK/NDK e compila tudo)
    timeout-minutes: 120

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Preparar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Preparar Java 17 (exigido pelo Gradle/SDK do Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool libtool-bin \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Instalar Buildozer e Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # IMPORTANTE: o python-for-android atual exige Cython 3.
          # (o antigo pin em 0.29.36 é o que quebrava o build)
          pip install --upgrade buildozer "cython>=3.0"

      - name: Guardar cache do Buildozer (acelera builds futuros)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Configurar credenciais do Login com Google (se o segredo existir)
        # O JSON do "OAuth Client" NÃO fica no repositório (é sensível). Aqui
        # ele é escrito a partir do segredo GOOGLE_OAUTH_CLIENT_JSON do
        # GitHub Actions, para ser empacotado no APK. Sem o segredo, o app
        # compila normalmente e apenas mostra "login não configurado".
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          if [ -n "$GOOGLE_OAUTH_CLIENT_JSON" ]; then
            mkdir -p credenciais
            printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > credenciais/oauth_client.json
            echo "credenciais/oauth_client.json criado a partir do segredo."
          else
            echo "Segredo GOOGLE_OAUTH_CLIENT_JSON ausente; login com Google ficará desativado neste APK."
          fi

      - name: Compilar o APK
        # -v = log detalhado, para o erro (se houver) ficar visível.
        # Sem "yes |": a licença do SDK já é aceita pelo
        # android.accept_sdk_license = True no buildozer.spec.
        #
        # IMPORTANTE: o Android Gradle Plugin exige Java 17, mas a imagem
        # ubuntu-22.04 deixa o JAVA_HOME padrão apontando para o Java 11 na
        # hora em que o Buildozer chama o gradlew (foi isso que quebrava o
        # build: "Android Gradle plugin requires Java 17 ... using Java 11").
        # Forçamos o Java 17 (JAVA_HOME_17_X64 já existe no runner) antes de
        # compilar.
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          buildozer -v android debug

      - name: Publicar o APK como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: vetsheets-apk
          path: bin/*.apk
          if-no-files-found: error
